<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>はてな分類選択 - Pikan</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
  <main>
    <header class="page-header">
      <h1 class="app-logo">
        <a class="app-logo__link" th:href="@{/}">
          <span class="app-logo__icon" aria-hidden="true">💡</span>
          <span class="app-logo__text">Pikan</span>
        </a>
      </h1>
      <p class="page-meta">5W1H から選んで入力を始めます</p>
    </header>

    <h2 class="page-title">はてなの分類（5W1H）を選択</h2>

    <section class="content-section">
      <div class="post-actions type-grid">
        <a class="post-action" th:href="@{/create(type=${T(com.example.pikan.enumtype.HatenaType).WHAT})}">WHAT</a>
        <a class="post-action" th:href="@{/create(type=${T(com.example.pikan.enumtype.HatenaType).WHERE})}">WHERE</a>
        <a class="post-action" th:href="@{/create(type=${T(com.example.pikan.enumtype.HatenaType).WHO})}">WHO</a>
        <a class="post-action" th:href="@{/create(type=${T(com.example.pikan.enumtype.HatenaType).WHEN})}">WHEN</a>
        <a class="post-action" th:href="@{/create(type=${T(com.example.pikan.enumtype.HatenaType).WHY})}">WHY</a>
        <a class="post-action" th:href="@{/create(type=${T(com.example.pikan.enumtype.HatenaType).HOW})}">HOW</a>
        <a class="post-action post-action--normal" th:href="@{/create(type=${T(com.example.pikan.enumtype.HatenaType).NORMAL})}">NORMAL</a>
      </div>
    </section>

    <div class="back-link">
      <a th:href="@{/}">ホームに戻る</a>
    </div>
  </main>
</body>
</html>
