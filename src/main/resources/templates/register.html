<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ユーザー登録 - Pikan</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
  <main>
    <h1 class="app-logo">
      <a class="app-logo__link" th:href="@{/login}">
        <span class="app-logo__icon" aria-hidden="true">💡</span>
        <span class="app-logo__text">Pikan</span>
      </a>
    </h1>

    <h2 class="page-title">ユーザー登録</h2>

    <section class="content-section">
      <form class="page-form" th:action="@{/register}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="form-field">
          <div class="form-label-row">
            <label class="form-label" for="username">ユーザー名</label>
            <span class="form-hint">半角英数字のみ・3文字以上20文字以内</span>
          </div>
          <input id="username" class="form-input" type="text" th:field="*{username}" autocomplete="username" />
          <div class="form-error" th:if="${#fields.hasErrors('username')}">
            <small th:errors="*{username}">username error</small>
          </div>
        </div>
        <div class="form-field">
          <div class="form-label-row">
            <label class="form-label" for="password">パスワード</label>
            <span class="form-hint">半角英数字のみ・8文字以上100文字以内</span>
          </div>
          <input id="password" class="form-input" type="password" th:field="*{password}" autocomplete="new-password" />
          <div class="form-error" th:if="${#fields.hasErrors('password')}">
            <small th:errors="*{password}">password error</small>
          </div>
        </div>
        <div>
          <button class="btn btn--primary" type="submit">登録</button>
        </div>
      </form>
    </section>

    <div class="back-link">
      <a th:href="@{/login}">ログイン画面へ</a>
    </div>
  </main>
</body>
</html>
