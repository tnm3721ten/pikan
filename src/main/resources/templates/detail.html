<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>詳細 - Pikan</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
  <main>
    <header class="page-header">
      <h1 class="app-logo">
        <a class="app-logo__link" th:href="@{/}">
          <span class="app-logo__icon" aria-hidden="true">💡</span>
          <span class="app-logo__text">Pikan</span>
        </a>
      </h1>
      <p class="page-meta" th:text="|type: ${hatena.type} / status: ${hatena.status}|">type: TYPE / status: STATUS</p>
    </header>

    <h2 class="page-title">詳細</h2>

    <!--表示情報はhatena、更新送信はformを使う-->
    <section class="content-section">
      <h3>内容の編集</h3>
      <form class="page-form" th:action="@{/update}" th:object="${form}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="hatena-detail-meta">
          <div>
            <strong>状態:</strong>
            <span
              th:text="${hatena.status == T(com.example.pikan.enumtype.HatenaStatus).RESOLVED ? '解決済み' : '未解決'}"
            >未解決</span>
          </div>
          <div>
            <strong>最終更新:</strong>
            <span th:text="${T(com.example.pikan.util.DateTimeFormats).format(hatena.updatedAt)}">updatedAt</span>
          </div>
          <!--解決済みのときだけ解決日時を表示する-->
          <div th:if="${hatena.status == T(com.example.pikan.enumtype.HatenaStatus).RESOLVED}">
            <strong>解決日時:</strong>
            <span th:text="${T(com.example.pikan.util.DateTimeFormats).format(hatena.resolvedAt)}">resolvedAt</span>
          </div>
        </div>


        <div class="form-field">
          <label class="form-label" for="content">はてな（本文）</label>
          <textarea
            id="content"
            class="form-textarea"
            th:field="*{content}"
            rows="6"
            placeholder="ここに入力してください"
          ></textarea>
          <div class="form-error" th:if="${#fields.hasErrors('content')}">
            <small th:errors="*{content}">content error</small>
          </div>
        </div>

        <div class="form-field">
          <label class="form-label" for="answer">回答</label>
          <textarea
            id="answer"
            class="form-textarea"
            th:field="*{answer}"
            rows="6"
            placeholder="（任意）回答を入力してください"
          ></textarea>
          <div class="form-error" th:if="${#fields.hasErrors('answer')}">
            <small th:errors="*{answer}">answer error</small>
          </div>
        </div>

        <div class="form-field">
          <label class="form-checkbox-label">
            <input type="checkbox" th:field="*{resolved}" />
            解決済み
          </label>
        </div>

        <div>
          <button class="btn btn--primary" type="submit">更新</button>
        </div>
      </form>
    </section>

    <hr />

    <section class="content-section">
      <form th:action="@{/delete}" method="post" onsubmit="return confirm('このはてなを削除しますか？');">
        <input type="hidden" name="id" th:value="${hatena.id}" />
        <button class="btn btn--danger" type="submit">削除</button>
      </form>
    </section>

    <div class="back-link">
      <a th:href="@{/}">ホームに戻る</a>
    </div>
  </main>
</body>
</html>
