<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikan</title>
</head>
<body>
  <main>
    <h1>Pikan</h1>

    <!--<section>はセクションを作成するためのタグ。
      <h2>はタイトルを作成するためのタグ。
      <div>はテキストを作成するためのタグ。
      <a>はリンクを作成するためのタグ。th:href="@{/post/5w1h}"は、/post/5w1hというURLにリンクを作成する。-->
      <!--はてなを投稿するフォーム-->
    <section>
      <h2>はてなを投稿</h2>
      <div>
        <a th:href="@{/select-type}">
          5W1H入力
        </a>
      </div>

      <!--URLの後ろにデータをくっつけるときには（）を書く。-->
      <!--@{・・・}は後ろの（）を自動で？と＆を使った形にしてくれる。追加情報は？で追加される。/create?type=NORMAL-->
      <!--${T(完全修飾クラス名).定数}
          ${ } (変数式):Java側のデータにアクセスするための記号
          T( ) (型指定):「ただの文字列」ではなく、Javaの特定のクラス（Type）そのものを指したいときに使う
          型指定をしておくと、enumの中から指定の文字を取り出して使うことができる。-->
      <div>
        <a th:href="@{/create(type=${T(com.example.pikan.enumtype.HatenaType).NORMAL})}">
          通常入力
        </a>
      </div>
    </section>

    <hr />

    <!--質問一覧を表示するセクション-->
    <!--
    th:styleはCSSを直接書くためのもの。-->
    <!--
    最初はｑにもtypeにもパラメータが飛んでこないので、nullになる。
    →　最初の画面は、全ての質問を表示する。

    @{・・・}の後ろの（）は、URLの後ろにデータをくっつけるためのもの。
    条件が合致していれば、値を後ろにつけることができる。最初の区切りが？でその後は＆で連結されるはずだが、それを自動でしてくれる。
    -->
    <section>
      <h2>質問一覧</h2>
      <nav aria-label="status tabs">
        <a th:href="@{/(status=${T(com.example.pikan.enumtype.HatenaStatus).OPEN},q=${q},type=${currentType})}"
           th:style="${currentStatus == T(com.example.pikan.enumtype.HatenaStatus).OPEN} ? 'font-weight:bold;text-decoration:underline;' : ''">
          未解決
        </a>
        <span> / </span>
        <a th:href="@{/(status=${T(com.example.pikan.enumtype.HatenaStatus).RESOLVED},q=${q},type=${currentType})}"
           th:style="${currentStatus == T(com.example.pikan.enumtype.HatenaStatus).RESOLVED} ? 'font-weight:bold;text-decoration:underline;' : ''">
          解決済み
        </a>
      </nav>

      <!--
      <select name="type">type ：typeという名前でコントローラーに送られる。valueは、選択された値が送られる。
      <option value="...">　：これが実際に送られる中身。
      th:selected=　：HTML上で～の時ってこと。
      -->
      <form th:action="@{/}" method="get">
        <input type="hidden" name="status" th:value="${currentStatus}" />
        <div>
          <label>type</label>
          <select name="type">
            <option value="" th:selected="${currentType == null}">全て</option>
            <option
              th:each="t : ${T(com.example.pikan.enumtype.HatenaType).values()}"
              th:value="${t}"
              th:text="${t}"
              th:selected="${currentType == t}"
            >WHY</option>
          </select>
        </div>

        <input type="text" name="q" placeholder="content / answer で検索" th:value="${q}" />
        <button type="submit">検索</button>
        <a th:href="@{/(status=${currentStatus})}">クリア</a>
      </form>

      <div th:if="${hatenaList == null || #lists.isEmpty(hatenaList)}">
        <p>該当するはてながありません</p>
      </div>

      <!--
      ulは中にあるリストを表示する。
      strongは強調して表示するためのもの
      HTMLでは「リストの箱（ul/ol）」の中に「項目（li）」を入れる、という決まり（構造）がある-->
      <!--
      strong：文中で重要な部分を表すタグ（見た目は太字になりやすい）
      span：特定の部分だけ囲って、後でCSSや表示差し替えをしやすくするための小さな箱
      -->
      <ul th:if="${hatenaList != null && !#lists.isEmpty(hatenaList)}">
        <li th:each="hatena : ${hatenaList}">
          <a th:href="@{/detail/{id}(id=${hatena.id})}">
            <strong th:text="${hatena.type}">TYPE</strong>
            <span>:</span>
            <span th:text="${#strings.abbreviate(hatena.content, 50)}">CONTENT</span>
          </a>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>
