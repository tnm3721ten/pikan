<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikan</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
  <main>
    <h1 class="app-logo">
      <a class="app-logo__link" th:href="@{/}">
        <span class="app-logo__icon" aria-hidden="true">💡</span>
        <span class="app-logo__text">Pikan</span>
      </a>
    </h1>

    <div class="user-bar">
      <p class="user-bar__name">
        ログイン中: <span th:text="${currentUsername}">username</span>
      </p>
      <form class="user-bar__logout" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn" type="submit">ログアウト</button>
      </form>
    </div>

    <p class="success-message" th:if="${successMessage != null}" th:text="${successMessage}">成功メッセージ</p>
    <p class="error-message" th:if="${errorMessage != null}" th:text="${errorMessage}">失敗メッセージ</p>


    <section class="post-section">
      <h2>はてなを投稿</h2>
      <div class="post-actions">
        <a class="post-action post-action--primary"
           th:href="@{/create(type=${T(com.example.pikan.enumtype.HatenaType).NORMAL})}">
          通常入力
        </a>
        <a class="post-action" th:href="@{/select-type}">
          5W1H入力
        </a>
      </div>
    </section>

    <hr />


    <section>
      <h2>はてな一覧</h2>
      <nav class="tabs" aria-label="status tabs">
        <!--タブ切り替え時も検索条件q/typeをURLに保持する-->
        <a class="tab"
           th:classappend="${currentStatus == T(com.example.pikan.enumtype.HatenaStatus).OPEN} ? ' is-active' : ''"
           th:href="@{/(status=${T(com.example.pikan.enumtype.HatenaStatus).OPEN},q=${q},type=${currentType})}">
          未解決
        </a>
        <a class="tab"
           th:classappend="${currentStatus == T(com.example.pikan.enumtype.HatenaStatus).RESOLVED} ? ' is-active' : ''"
           th:href="@{/(status=${T(com.example.pikan.enumtype.HatenaStatus).RESOLVED},q=${q},type=${currentType})}">
          解決済み
        </a>
      </nav>


      <!--statusはhiddenで保持し、type/qだけGETパラメータとして送る-->
      <form class="search-form" th:action="@{/}" method="get">
        <input type="hidden" name="status" th:value="${currentStatus}" />
        <div class="search-form__row">
          <div class="search-form__field">
            <label class="search-form__label" for="searchType">type</label>
            <select id="searchType" name="type" class="search-form__select">
            <option value="" th:selected="${currentType == null}">全て</option>
            <option
              th:each="t : ${T(com.example.pikan.enumtype.HatenaType).values()}"
              th:value="${t}"
              th:text="${t}"
              th:selected="${currentType == t}"
            ></option>
            </select>
          </div>

          <div class="search-form__field search-form__field--grow">
            <label class="search-form__label" for="searchQuery">キーワード</label>
            <input
              id="searchQuery"
              class="search-form__input"
              type="search" 
              name="q"
              placeholder="content / answer で検索"
              th:value="${q}"
            />
          </div>

          <div class="search-form__actions">
            <button class="search-form__submit" type="submit">検索</button>
            <a class="search-form__clear" th:href="@{/(status=${currentStatus})}">クリア</a>
          </div>
        </div>
      </form>


      <div th:if="${hatenaList == null || #lists.isEmpty(hatenaList)}">
        <p>該当するはてながありません</p>
      </div>


      <ul class="hatena-list" th:if="${hatenaList != null && !#lists.isEmpty(hatenaList)}">
        <li class="hatena-item" th:each="hatena : ${hatenaList}">
          <a class="hatena-item__link" th:href="@{/detail/{id}(id=${hatena.id})}">
            <span class="hatena-type"
                  th:classappend="|hatena-type--${hatena.type.name()}|"
                  th:text="${hatena.type}">TYPE</span>
            <span class="hatena-content" th:text="${#strings.abbreviate(hatena.content, 50)}">CONTENT</span>
            <span class="hatena-meta">
              <span th:text="${T(com.example.pikan.util.DateTimeFormats).format(hatena.createdAt)}">createdAt</span>
              <span> / </span>
              <span class="hatena-status"
                    th:classappend="${hatena.status == T(com.example.pikan.enumtype.HatenaStatus).RESOLVED} ? ' hatena-status--resolved' : ' hatena-status--open'"
                    th:text="${hatena.status == T(com.example.pikan.enumtype.HatenaStatus).RESOLVED ? '解決済み' : '未解決'}">status</span>
            </span>
          </a>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>
