<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン - Pikan</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
  <main>
    <h1 class="app-logo">
      <a class="app-logo__link" th:href="@{/login}">
        <span class="app-logo__icon" aria-hidden="true">💡</span>
        <span class="app-logo__text">Pikan</span>
      </a>
    </h1>

    <h2 class="page-title">ログイン</h2>

    <p class="success-message" th:if="${successMessage != null}" th:text="${successMessage}">成功メッセージ</p>
    <p class="error-message" th:if="${param.required}">ログインしてください</p>
    <p class="error-message" th:if="${param.error}">ユーザー名またはパスワードが正しくありません</p>

    <section class="content-section">
      <form class="page-form" th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="form-field">
          <label class="form-label" for="username">ユーザー名</label>
          <input id="username" class="form-input" type="text" name="username" th:value="${username}" autocomplete="username" />
        </div>
        <div class="form-field">
          <label class="form-label" for="password">パスワード</label>
          <input id="password" class="form-input" type="password" name="password" autocomplete="current-password" />
        </div>
        <div>
          <button class="btn btn--primary" type="submit">ログイン</button>
        </div>
      </form>
    </section>

    <div class="back-link">
      <a th:href="@{/register}">新規登録はこちら</a>
    </div>
  </main>
</body>
</html>
