<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="|入力画面 - Pikan（type=${form.type}）|">入力画面 - Pikan</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
  <main>
    <header class="page-header">
      <h1 class="app-logo">
        <a class="app-logo__link" th:href="@{/}">
          <span class="app-logo__icon" aria-hidden="true">💡</span>
          <span class="app-logo__text">Pikan</span>
        </a>
      </h1>
      <p class="page-meta" th:text="|現在の type: ${form.type}|">現在の type: TYPE</p>
    </header>

    <h2 class="page-title" th:text="|入力画面（${form.type}）|">入力画面</h2>

    <section class="content-section">
      <h3>内容を入力</h3>
      <form class="page-form" th:action="@{/save}" th:object="${form}" method="post">
        <!--種別はURLから決定済みのためhiddenで送信する-->
        <input type="hidden" th:field="*{type}" />
        <div class="form-field">
          <label class="form-label" for="content">はてな（本文）</label>
          <textarea
            id="content"
            class="form-textarea"
            th:field="*{content}"
            rows="6"
            placeholder="ここに入力してください"
          ></textarea>
          <div class="form-error" th:if="${#fields.hasErrors('content')}">
            <small th:errors="*{content}">content error</small>
          </div>
        </div>
        <div>
          <button class="btn btn--primary" type="submit">保存</button>
        </div>
      </form>
    </section>

    <div class="back-link">
      <a th:href="@{/}">ホームに戻る</a>
    </div>
  </main>
</body>
</html>
