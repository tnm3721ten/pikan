spring.application.name=pikan

# PostgreSQL (design: DB名=pikan, port=5432)
spring.datasource.url=jdbc:postgresql://localhost:5432/pikan
spring.datasource.username=${PIKAN_DB_USERNAME:postgres}
spring.datasource.password=${PIKAN_DB_PASSWORD:pegasus10}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (DBスキーマはSQLで管理する想定)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# SQL init (必要に応じて schema.sql を実行)
spring.sql.init.mode=never
